name: Update Name-ID Table

on:
  push:
    branches:
      - main
    paths:
      - "data/circles/list.yaml"

jobs:
  update-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Added to allow creating PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Markdown Table
        run: |
          echo "Generating name-id.md..."
          yq -r '.[] | "- **" + .name + "**: `" + .id + "`"' data/circles/list.yaml > name-id.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: auto-update name-id.md from list.yaml"
          title: "docs: auto-update name-id.md"
          body: "Detected changes in list.yaml and auto-updated name-id.md."
          branch: "auto-update-name-id" # Name of the PR branch to be created
          base: "main"
          # It will automatically skip doing anything if there are no changes
